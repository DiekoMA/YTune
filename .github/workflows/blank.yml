publish:
    needs: [build, build_debug] # Wait for both jobs to finish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4 # Downloads all apk artifacts from the matrix
        with:
          path: all-apks/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }} # Or use a dynamic version
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
          files: all-apks/*.apk # This picks up every APK downloaded above
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
